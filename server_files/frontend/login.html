    <form id+="login_form">
        <label>username:</label>
        <input type="text" name = "username" id = "username">
        <br>
        <label>password:</label>
        <input type="password" name = "password" id ="password">
        <br>
        <button type="submit">Send Request</button>
    </form>
    
    <br>
    <a href="forgot_password">forgot password</a>

    <script>
        document.getElementById("login_form").addEventListener("submit",test())

        function login_correct(username,password){
            // if too long or contains special char other than _ give error 1
            if (! /^[a-zA-Z0-9_]+$/.test(username) || username.length > 16){
                console.log("h")
                return 1
            } 
            //if not 8 to 16 char give error 2
            if (password.length < 8 || password.length > 16){
                console.log("HI")
                return 2
            }
            //should contain atleast one capital and one special char other than " " else err 3
            if (! /[A-Z]/.test(password) || /^[a-zA-Z0-9]+$/.test(password)){
                console.log("HII")
                return 3
            }
            //if it has space return a error 4
            if (! (password.indexOf(' ')+1 == 0)){
                console.log("hIII")
                return 4
            }
            return 0
        }

        async function test() {
            username = document.getElementById("username").value;
            password = document.getElementById("password").value;
            var allow = login_correct(username,password)

    </script>

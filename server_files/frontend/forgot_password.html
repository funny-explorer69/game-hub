<!DOCTYPE html>
<html>
<head>
    <title>reset password</title>
</head>
<body>
    
    <form id="forgot_password_form">
        <label>username:</label>
        <input type="text" name="username" id="username">
        <br>
        <button type="submit">submit</button>
    </form>
    <script>
        document.getElementById("forgot_password_form").addEventListener("submit",send_email)
        async function send_email(event){
            username = document.getElementById("username").value;
            event.preventDefault()
            const response = await fetch( //should change here to make it into parameterised one with username and password
                    "http://127.0.0.1:8000/forgot_password",
                    {
                        method : "POST", // by default its get method
                        headers :{
                            "Content-Type" : "application/json"
                        },
                        body : JSON.stringify({"username":username})
                    }
                );
        };
    </script>
</body>
